pipeline {
    agent any

    environment {
        AWS_REGION = "us-east-1"
        ECR_REPO = "test-alpha"
        ACCOUNT_ID = "069176179632"
        IMAGE_TAG = "latest"
        CLUSTER_NAME = "extravagant-funk-dinosaur"
    }

    stages {

        stage('Clone Repo') {
            steps {
                git 'https://github.com/iamtejas23/test-alpha.git'
            }
        }

        stage('Build Docker Image') {
            steps {
                script {
                    sh """
                    docker build -t $ECR_REPO:$IMAGE_TAG .
                    """
                }
            }
        }

        stage('Login to ECR') {
            steps {
                script {
                    sh """
                    aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
                    """
                }
            }
        }

        stage('Tag & Push Image') {
            steps {
                script {
                    sh """
                    docker tag $ECR_REPO:$IMAGE_TAG \
                    ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/$ECR_REPO:$IMAGE_TAG

                    docker push \
                    ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/$ECR_REPO:$IMAGE_TAG
                    """
                }
            }
        }

        stage('Update kubeconfig') {
            steps {
                script {
                    sh """
                    aws eks update-kubeconfig \
                    --region $AWS_REGION \
                    --name $CLUSTER_NAME
                    """
                }
            }
        }

        stage('Deploy to EKS') {
            steps {
                script {
                    sh """
                    kubectl apply -f k8s/deployment.yaml
                    kubectl apply -f k8s/service.yaml
                    """
                }
            }
        }

        stage('Rollout Update') {
            steps {
                script {
                    sh """
                    kubectl rollout restart deployment/test-app
                    kubectl rollout status deployment/test-app
                    """
                }
            }
        }
    }
}